<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#080b14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Kavi — your second brain</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #080b14;
            --bg-secondary: #0f1420;
            --bg-card: #131a2a;
            --bg-card-hover: #1a2236;
            --bg-input: #1a2236;
            --bg-modal: #0f1420;
            
            --accent-blue: #4f8ef7;
            --accent-blue-dim: rgba(79, 142, 247, 0.15);
            --accent-violet: #a78bfa;
            --accent-violet-dim: rgba(167, 139, 250, 0.15);
            
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-active: rgba(255, 255, 255, 0.12);
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 20px;
            
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-modal: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.4);
            
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
            
            --header-height: 56px;
            --column-width: 300px;
            --column-width-mobile: 88vw;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-active);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Selection */
        ::selection {
            background: var(--accent-blue-dim);
            color: var(--text-primary);
        }

        /* ============ AUTH SCREEN ============ */
        #auth-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            z-index: 1000;
            padding: 20px;
        }

        #auth-screen.hidden {
            display: none;
        }

        .auth-card {
            width: 100%;
            max-width: 380px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            text-align: center;
            box-shadow: var(--shadow-modal);
        }

        .auth-logo {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .auth-tagline {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 40px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px var(--accent-blue-dim);
        }

        .auth-input::placeholder {
            color: var(--text-muted);
        }

        .auth-error {
            color: var(--danger);
            font-size: 13px;
            min-height: 20px;
        }

        .auth-btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
        }

        .auth-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(79, 142, 247, 0.3);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        /* ============ APP LAYOUT ============ */
        #app {
            display: none;
            flex-direction: column;
            height: 100dvh;
            background: var(--bg-primary);
        }

        #app.visible {
            display: flex;
        }

        /* ============ HEADER ============ */
        .header {
            height: var(--header-height);
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .agent-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .agent-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            width: 200px;
            padding: 8px 12px 8px 36px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            transition: all var(--transition-fast);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            width: 260px;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .mobile-search-btn {
            display: none;
            width: 36px;
            height: 36px;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: background var(--transition-fast);
        }

        .mobile-search-btn:hover {
            background: var(--bg-input);
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
        }

        .icon-btn:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .icon-btn.primary {
            background: var(--accent-blue);
            color: white;
        }

        .icon-btn.primary:hover {
            background: #5a9bf8;
            transform: scale(1.05);
        }

        /* ============ BOARD ============ */
        .board {
            flex: 1;
            display: flex;
            gap: 16px;
            padding: 20px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }

        .board::-webkit-scrollbar {
            height: 8px;
        }

        /* ============ COLUMNS ============ */
        .column {
            flex-shrink: 0;
            width: var(--column-width);
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            max-height: 100%;
            scroll-snap-align: start;
        }

        .column-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .column-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .column-color-bar {
            width: 4px;
            height: 20px;
            border-radius: 2px;
        }

        .column-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .column-count {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            background: var(--bg-input);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .column-cards {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 100px;
        }

        .column-add-btn {
            padding: 12px;
            border-top: 1px solid var(--border-subtle);
        }

        .add-card-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px dashed var(--border-active);
            border-radius: var(--radius-md);
            color: var(--text-muted);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all var(--transition-fast);
        }

        .add-card-btn:hover {
            background: var(--bg-input);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        /* Column Colors */
        .column[data-id="backlog"] .column-color-bar { background: var(--text-muted); }
        .column[data-id="todo"] .column-color-bar { background: var(--accent-blue); }
        .column[data-id="progress"] .column-color-bar { background: var(--warning); }
        .column[data-id="done"] .column-color-bar { background: var(--success); }

        /* ============ CARDS ============ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 14px;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            touch-action: pan-y;
        }

        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
        }

        .card.priority-high::before { background: var(--danger); }
        .card.priority-medium::before { background: var(--warning); }
        .card.priority-low::before { background: var(--accent-blue); }

        .card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-active);
            transform: translateY(-2px);
            box-shadow: var(--shadow-card);
        }

        .card.dragging {
            opacity: 0.5;
            transform: rotate(3deg);
        }

        .card.ghost {
            opacity: 0.4;
        }

        .card.filtered-out {
            opacity: 0.15;
            pointer-events: none;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.4;
            flex: 1;
        }

        .card-badges {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .badge {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            background: var(--bg-input);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .badge.job {
            background: var(--accent-violet-dim);
            color: var(--accent-violet);
        }

        .badge.comments {
            background: var(--accent-blue-dim);
            color: var(--accent-blue);
        }

        .badge.attachment {
            background: var(--success);
            color: var(--bg-primary);
        }

        .badge.voice {
            background: var(--warning);
            color: var(--bg-primary);
        }

        .card-description {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .card-labels {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 10px;
        }

        .label {
            font-size: 11px;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--accent-blue-dim);
            color: var(--accent-blue);
        }

        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .card-due {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-due.overdue {
            color: var(--danger);
        }

        .card-agent {
            font-size: 11px;
            color: var(--accent-violet);
        }

        .card-time {
            font-size: 11px;
        }

        .card-delete {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--danger);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .card:hover .card-delete {
            opacity: 1;
        }

        /* Swipe Actions */
        .card-swipe-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-md);
        }

        .swipe-action {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .swipe-action-left {
            left: 0;
            background: var(--danger);
            border-radius: var(--radius-md) 0 0 var(--radius-md);
        }

        .swipe-action-right {
            right: 0;
            background: var(--success);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
        }

        /* ============ MODAL ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 500;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
        }

        .modal-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            background: var(--bg-modal);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            overflow: hidden;
            transform: translateY(100%);
            transition: transform var(--transition-spring);
        }

        .modal-overlay.visible .modal {
            transform: translateY(0);
        }

        .modal-handle {
            width: 36px;
            height: 4px;
            background: var(--border-active);
            border-radius: 2px;
            margin: 12px auto;
        }

        .modal-header {
            padding: 0 20px 16px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .modal-content {
            padding: 20px;
            overflow-y: auto;
            max-height: calc(90vh - 200px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all var(--transition-fast);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px var(--accent-blue-dim);
        }

        textarea.form-input {
            min-height: 100px;
            resize: vertical;
        }

        select.form-input {
            cursor: pointer;
        }

        .priority-pills {
            display: flex;
            gap: 8px;
        }

        .priority-pill {
            flex: 1;
            padding: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .priority-pill:hover {
            border-color: var(--border-active);
        }

        .priority-pill.active.low {
            background: var(--accent-blue-dim);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .priority-pill.active.medium {
            background: rgba(251, 191, 36, 0.15);
            border-color: var(--warning);
            color: var(--warning);
        }

        .priority-pill.active.high {
            background: rgba(248, 113, 113, 0.15);
            border-color: var(--danger);
            color: var(--danger);
        }

        .labels-display {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .label-removable {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            padding: 4px 8px;
            background: var(--accent-blue-dim);
            color: var(--accent-blue);
            border-radius: 4px;
        }

        .label-remove {
            cursor: pointer;
            opacity: 0.7;
            transition: opacity var(--transition-fast);
        }

        .label-remove:hover {
            opacity: 1;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            background: var(--bg-input);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
        }

        .toggle-label {
            font-size: 14px;
            color: var(--text-primary);
        }

        .toggle {
            width: 44px;
            height: 24px;
            background: var(--border-active);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        .toggle.active {
            background: var(--accent-blue);
        }

        .toggle::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform var(--transition-fast);
        }

        .toggle.active::after {
            transform: translateX(20px);
        }

        .agent-section {
            display: none;
        }

        .agent-section.visible {
            display: block;
        }

        .drop-zone {
            border: 2px dashed var(--border-active);
            border-radius: var(--radius-md);
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-blue);
            background: var(--accent-blue-dim);
        }

        .drop-zone-text {
            font-size: 13px;
            color: var(--text-muted);
        }

        .attachments-list {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .attachment-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: var(--bg-input);
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .attachment-remove {
            cursor: pointer;
            color: var(--text-muted);
            transition: color var(--transition-fast);
        }

        .attachment-remove:hover {
            color: var(--danger);
        }

        .voice-recorder {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: var(--bg-input);
            border-radius: var(--radius-md);
        }

        .record-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--danger);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .record-btn:hover {
            transform: scale(1.1);
        }

        .record-btn.recording {
            animation: recordPulse 1s infinite;
        }

        @keyframes recordPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.4); }

        .record-status {
            font-size: 13px;
            color: var(--text-muted);
        }

        .record-timer {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);

        }

        .comments-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-subtle);
        }

        .comments-title {
            font-size: 14px;
            font-weight: 600;

        .comment {

            gap: 10px;
            margin-bottom: 16px;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .comment-body {
            flex: 1;
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 8px;

        .comment-author {

        .comment-form {
            display: flex;

        }

            font-family: inherit;

        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .btn-delete {
            padding: 10px 16px;
            background: rgba(248, 113, 113, 0.15);
            border: 1px solid var(--danger);
            border-radius: var(--radius-md);
            color: var(--danger);
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        .btn-save {
            flex: 1;
            padding: 12px 24px;
            background: var(--accent-blue);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-save:hover {
            background: #5a9bf8;
            transform: translateY(-1px);
        }

        /* ============ AGENT PANEL ============ */
        .agent-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 360px;
            max-width: 100%;
            height: 100%;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-subtle);
            transform: translateX(100%);
            transition: transform var(--transition-normal);
            z-index: 400;
            display: flex;
            flex-direction: column;
        }

        .agent-panel.visible {
            transform: translateX(0);
        }

        .agent-panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .agent-panel-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .agent-panel-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .job-card {
            padding: 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            margin-bottom: 10px;
        }

        .job-title {
            font-size: 14px;
            font-weight: 500;

            margin-bottom: 8px;
        }

        .job-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .job-claim-btn {
            width: 100%;
            padding: 8px 12px;
            background: var(--accent-violet-dim);
            border: 1px solid var(--accent-violet);
            border-radius: var(--radius-sm);
            color: var(--accent-violet);
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .job-claim-btn:hover {
            background: var(--accent-violet);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 14px;
        }

        /* ============ KEYBOARD SHORTCUTS HINT ============ */
        .shortcuts-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .shortcuts-hint kbd {
            display: inline-block;
            padding: 2px 6px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            font-family: inherit;
            font-size: 10px;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .search-container {
                display: none;
            }

            .mobile-search-btn {
                display: flex;
            }

            .board {
                padding: 16px;
                gap: 12px;
            }

            .column {
                width: var(--column-width-mobile);
            }

            .modal {
                max-height: 95vh;
            }

            .modal-content {
                max-height: calc(95vh - 180px);
            }

            .shortcuts-hint {
                display: none;
            }

            .agent-panel {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 0 12px;
            }

            .logo {
                font-size: 20px;
            }

            .column {
                width: calc(100vw - 32px);
            }

            .auth-card {
                padding: 32px 24px;
            }
        }

        /* Loading state */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-float);
            font-size: 13px;
            color: var(--text-primary);
            animation: slideIn var(--transition-spring) forwards;
        }

        .toast.success {
            border-color: var(--success);
        }

        .toast.error {
            border-color: var(--danger);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-logo">Kavi</div>
            <div class="auth-tagline">your second brain</div>

                <div class="auth-error" id="auth-error"></div>
                <button type="submit" class="auth-btn">Open Kavi</button>

        </div>

    <!-- App -->
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">Kavi</div>
                <div class="agent-status">

            <div class="header-right">

                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="M21 21l-4.35-4.35"></path>
                    </svg>
                    <input type="text" class="search-input" id="search-input" placeholder="Search cards... (S)">
                </div>
                <button class="mobile-search-btn" id="mobile-search-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="M21 21l-4.35-4.35"></path>
                    </svg>
                </button>
                <button class="icon-btn" id="agent-btn" title="Agent Jobs">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                </button>
                <button class="icon-btn primary" id="add-card-btn" title="New Card (N)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">

                    </svg>
                </button>

        </header>

        <!-- Board -->
        <div class="board" id="board">
            <!-- Columns will be rendered here -->
        </div>

        <!-- Shortcuts Hint -->
        <div class="shortcuts-hint">
            <kbd>N</kbd> new &nbsp; <kbd>S</kbd> search &nbsp; <kbd>R</kbd> record &nbsp; <kbd>Esc</kbd> close
        </div>
    </div>

    <!-- Card Modal -->
    <div class="modal-overlay" id="card-modal">
        <div class="modal">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <div class="form-group" style="margin-bottom: 0;">

                </div>

                </div>

                <div class="form-group">
                    <label class="form-label">Column</label>
                    <select class="form-input" id="modal-column">

                <div class="form-group">

                        <button type="button" class="priority-pill low" data-priority="low">Low</button>

                <div class="form-group">

                <div class="form-group">

                    <div class="drop-zone" id="drop-zone">

                                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>

                        </div>

                </div>

                <div class="form-group">
                    <label class="form-label">Voice Memo</label>
                    <div class="voice-recorder">
                        <button class="record-btn" id="record-btn">●</button>
                        <div>
                            <div class="record-status" id="record-status">Click to record</div>
                            <div class="record-timer" id="record-timer">0:00</div>
                        </div>
                    </div>
                </div>

                <div class="comments-section">
                    <div class="comments-title">Comments</div>
                    <div id="comments-list"></div>
                    <div class="comment-form">
                        <input type="text" class="comment-input" id="comment-input" placeholder="Add a comment...">
                        <button class="comment-submit" id="comment-submit">Send</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-delete" id="modal-delete">Delete</button>
                <button class="btn-save" id="modal-save">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Agent Panel -->
    <div class="agent-panel" id="agent-panel">
        <div class="agent-panel-header">
            <div class="agent-panel-title">Agent Jobs</div>
            <button class="icon-btn" id="close-agent-panel">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <div class="agent-panel-content" id="agent-jobs-list">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // ============ STATE ============
        const state = {
            token: localStorage.getItem('kavi_token'),
            columns: [],
            cards: [],
            currentCard: null,
            searchQuery: '',
            mediaRecorder: null,
            audioChunks: [],
            isRecording: false,
            recordingTimer: null,
            recordingStartTime: null
        };

        const API_BASE = '/api';
        const PASSWORD = 'kanban-18190';

        // ============ API HELPERS ============
        async function api(endpoint, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...(state.token && { 'Authorization': `Bearer ${state.token}` })
            };

            const response = await fetch(`${API_BASE}${endpoint}`, {
                ...options,
                headers: { ...headers, ...options.headers }
            });

            if (response.status === 401) {
                logout();
                throw new Error('Unauthorized');
            }

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'API Error');
            return data;
        }

        // ============ AUTH ============
        function logout() {
            state.token = null;
            localStorage.removeItem('kavi_token');
            document.getElementById('app').classList.remove('visible');
            document.getElementById('auth-screen').classList.remove('hidden');
        }

        async function login(password) {
            try {
                const data = await api('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ password })
                });
                state.token = data.token;
                localStorage.setItem('kavi_token', data.token);
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app').classList.add('visible');
                loadBoard();
            } catch (error) {
                document.getElementById('auth-error').textContent = 'Incorrect password. Please try again.';
            }
        }

        // ============ BOARD ============
        async function loadBoard() {
            try {
                const data = await api('/board');
                state.columns = data.columns || getDefaultColumns();
                state.cards = data.cards || [];
                renderBoard();
            } catch (error) {
                state.columns = getDefaultColumns();
                state.cards = [];
                renderBoard();
            }
        }

        function getDefaultColumns() {
            return [
                { id: 'backlog', title: 'Backlog', color: '#64748b' },
                { id: 'todo', title: 'To Do', color: '#4f8ef7' },
                { id: 'inprogress', title: 'In Progress', color: '#fbbf24' },
                { id: 'done', title: 'Done', color: '#34d399' }
            ];
        }

        // ============ RENDER ============
        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = state.columns.map(col => `
                <div class="column" data-id="${col.id}">
                    <div class="column-header">
                        <div class="column-title-row">
                            <div class="column-color-bar"></div>
                            <span class="column-title">${col.title}</span>
                        </div>
                        <span class="column-count">${state.cards.filter(c => c.column === col.id).length}</span>
                    </div>
                    <div class="column-cards" data-column="${col.id}"></div>
                    <div class="column-add-btn">
                        <button class="add-card-btn" data-column="${col.id}">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M12 5v14M5 12h14"></path>
                            </svg>
                            Add card
                        </button>
                    </div>
                </div>
            `).join('');

            renderCards();
            initDragDrop();
            initColumnEvents();
        }

        function renderCards() {
            state.columns.forEach(col => {
                const container = document.querySelector(`[data-column="${col.id}"]`);
                if (!container) return;

                const colCards = state.cards.filter(c => c.column === col.id);
                container.innerHTML = colCards.map(card => renderCard(card)).join('');

                // Re-init swipe events for new cards
                container.querySelectorAll('.card').forEach(card => {
                    initSwipeEvents(card);
                });
            });

            // Update counts
            state.columns.forEach(col => {
                const count = state.cards.filter(c => c.column === col.id).length;
                const countEl = document.querySelector(`.column[data-id="${col.id}"] .column-count`);
                if (countEl) countEl.textContent = count;
            });
        }

        function renderCard(card) {
            const labels = card.labels || [];
            const isOverdue = card.dueDate && new Date(card.dueDate) < new Date() && card.column !== 'done';
            
            return `
                <div class="card priority-${card.priority || 'low'}" data-id="${card.id}" draggable="true">
                    <button class="card-delete" data-id="${card.id}">×</button>
                    <div class="card-header">
                        <div class="card-title">${escapeHtml(card.title || 'Untitled')}</div>
                        <div class="card-badges">
                            ${card.isJob ? '<span class="badge job">Job</span>' : ''}
                            ${(card.comments?.length || 0) > 0 ? `<span class="badge comments">${card.comments.length}</span>` : ''}
                            ${(card.attachments?.length || 0) > 0 ? '<span class="badge attachment">📎</span>' : ''}
                            ${card.voiceMemo ? '<span class="badge voice">🎤</span>' : ''}
                        </div>
                    </div>
                    ${card.description ? `<div class="card-description">${escapeHtml(card.description)}</div>` : ''}
                    ${labels.length > 0 ? `
                        <div class="card-labels">
                            ${labels.map(l => `<span class="label">${escapeHtml(l)}</span>`).join('')}
                        </div>
                    ` : ''}
                    <div class="card-meta">
                        <div class="card-due ${isOverdue ? 'overdue' : ''}">
                            ${card.dueDate ? `
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                ${formatDate(card.dueDate)}
                            ` : ''}
                        </div>
                        <div class="card-agent">${card.agent ? `@${card.agent}` : ''}</div>
                    </div>
                </div>
            `;
        }

        // ============ DRAG & DROP ============
        function initDragDrop() {
            const containers = document.querySelectorAll('.column-cards');
            
            containers.forEach(container => {
                new Sortable(container, {
                    group: 'cards',
                    animation: 200,
                    ghostClass: 'ghost',
                    dragClass: 'dragging',
                    handle: '.card',
                    onEnd: async (evt) => {
                        const cardId = evt.item.dataset.id;
                        const newColumn = evt.to.dataset.column;
                        const card = state.cards.find(c => c.id === cardId);
                        
                        if (card && card.column !== newColumn) {
                            card.column = newColumn;
                            await saveCard(card);
                        }
                    }
                });
            });
        }

        // ============ SWIPE EVENTS ============
        function initSwipeEvents(cardEl) {
            let startX = 0;
            let currentX = 0;
            let isDragging = false;

            cardEl.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                isDragging = false;
            }, { passive: true });

            cardEl.addEventListener('touchmove', (e) => {
                currentX = e.touches[0].clientX;
                const diff = currentX - startX;
                
                if (Math.abs(diff) > 10) {
                    isDragging = true;
                    const leftAction = cardEl.querySelector('.swipe-action-left');
                    const rightAction = cardEl.querySelector('.swipe-action-right');
                    
                    if (diff < 0) {
                        cardEl.style.transform = `translateX(${diff}px)`;
                        if (leftAction) leftAction.style.opacity = Math.min(1, Math.abs(diff) / 60);
                    } else {
                        cardEl.style.transform = `translateX(${diff}px)`;
                        if (rightAction) rightAction.style.opacity = Math.min(1, Math.abs(diff) / 60);
                    }
                }
            }, { passive: true });

            cardEl.addEventListener('touchend', () => {
                if (!isDragging) return;
                
                const diff = currentX - startX;
                const cardId = cardEl.dataset.id;
                
                if (Math.abs(diff) > 80) {
                    if (diff < 0) {
                        // Swipe left - delete
                        deleteCard(cardId);
                    } else {
                        // Swipe right - move to next column
                        moveCardRight(cardId);
                    }
                }
                
                cardEl.style.transform = '';
                const actions = cardEl.querySelectorAll('.swipe-action');
                actions.forEach(a => a.style.opacity = 0);
            });
        }

        // ============ CARD CRUD ============
        async function saveCard(card) {
            try {
                if (card.id) {
                    await api(`/cards/${card.id}`, {
                        method: 'PUT',
                        body: JSON.stringify(card)
                    });
                } else {
                    const result = await api('/cards', {
                        method: 'POST',
                        body: JSON.stringify(card)
                    });
                    card.id = result.id;
                }
                renderCards();
            } catch (error) {
                showToast('Failed to save card', 'error');
            }
        }

        async function deleteCard(cardId) {
            if (!confirm('Delete this card?')) return;
            
            try {
                await api(`/cards/${cardId}`, { method: 'DELETE' });
                state.cards = state.cards.filter(c => c.id !== cardId);
                renderCards();
                showToast('Card deleted', 'success');
            } catch (error) {
                showToast('Failed to delete card', 'error');
            }
        }

        function moveCardRight(cardId) {
            const card = state.cards.find(c => c.id === cardId);
            if (!card) return;

            const colIndex = state.columns.findIndex(col => col.id === card.column);
            if (colIndex < state.columns.length - 1) {
                card.column = state.columns[colIndex + 1].id;
                saveCard(card);
                showToast(`Moved to ${state.columns[colIndex + 1].title}`, 'success');
            }
        }

        function moveCardLeft(cardId) {
            const card = state.cards.find(c => c.id === cardId);
            if (!card) return;

            const colIndex = state.columns.findIndex(col => col.id === card.column);
            if (colIndex > 0) {
                card.column = state.columns[colIndex - 1].id;
                saveCard(card);
                showToast(`Moved to ${state.columns[colIndex - 1].title}`, 'success');
            }
        }

        // ============ MODAL ============
        function openModal(card = null) {
            state.currentCard = card || {
                id: null,
                title: '',
                description: '',
                column: 'backlog',
                priority: 'low',
                labels: [],
                dueDate: '',
                isJob: false,
                agentInstructions: '',
                attachments: [],
                voiceMemo: null,
                comments: []
            };

            const modal = document.getElementById('card-modal');
            const titleEl = document.getElementById('modal-title');
            const descEl = document.getElementById('modal-description');
            const colEl = document.getElementById('modal-column');
            const labelsEl = document.getElementById('modal-labels');
            const dueDateEl = document.getElementById('modal-due-date');
            const jobToggle = document.getElementById('job-toggle');
            const agentSection = document.getElementById('agent-section');
            const instructionsEl = document.getElementById('modal-agent-instructions');

            titleEl.value = state.currentCard.title || '';
            descEl.value = state.currentCard.description || '';
            colEl.value = state.currentCard.column || 'backlog';
            labelsEl.value = (state.currentCard.labels || []).join(', ');
            dueDateEl.value = state.currentCard.dueDate || '';
            
            jobToggle.classList.toggle('active', state.currentCard.isJob);
            agentSection.classList.toggle('visible', state.currentCard.isJob);
            instructionsEl.value = state.currentCard.agentInstructions || '';

            // Priority pills
            document.querySelectorAll('.priority-pill').forEach(pill => {
                pill.classList.toggle('active', pill.dataset.priority === (state.currentCard.priority || 'low'));
            });

            renderLabelsPreview();
            renderAttachments();

            modal.classList.add('visible');
        }

        function closeModal() {
            document.getElementById('card-modal').classList.remove('visible');
            state.currentCard = null;
        }

        async function saveModal() {
            const title = document.getElementById('modal-title').value.trim();
            if (!title) {
                showToast('Please enter a title', 'error');
                return;
            }

            const priority = document.querySelector('.priority-pill.active')?.dataset.priority || 'low';
            const labelsInput = document.getElementById('modal-labels').value;
            const labels = labelsInput.split(',').map(l => l.trim()).filter(l => l);

            state.currentCard.title = title;
            state.currentCard.description = document.getElementById('modal-description').value;
            state.currentCard.column = document.getElementById('modal-column').value;
            state.currentCard.priority = priority;
            state.currentCard.labels = labels;
            state.currentCard.dueDate = document.getElementById('modal-due-date').value;
            state.currentCard.isJob = document.getElementById('job-toggle').classList.contains('active');
            state.currentCard.agentInstructions = document.getElementById('modal-agent-instructions').value;

            if (!state.currentCard.id) {
                state.cards.push(state.currentCard);
            }

            await saveCard(state.currentCard);
            closeModal();
            showToast('Card saved', 'success');
        }

        async function deleteModalCard() {
            if (!state.currentCard?.id) {
                closeModal();
                return;
            }
            await deleteCard(state.currentCard.id);
            closeModal();
        }

        // ============ LABELS PREVIEW ============
        function renderLabelsPreview() {
            const container = document.getElementById('modal-labels-display');
            const labels = document.getElementById('modal-labels').value
                .split(',')
                .map(l => l.trim())
                .filter(l => l);

            container.innerHTML = labels.map((label, i) => `
                <span class="label-removable">
                    ${escapeHtml(label)}
                    <span class="label-remove" data-index="${i}">×</span>
                </span>
            `).join('');

            container.querySelectorAll('.label-remove').forEach(btn => {
                btn.addEventListener('click', () => {
                    const labels = document.getElementById('modal-labels').value.split(',').map(l => l.trim()).filter(l => l);
                    labels.splice(parseInt(btn.dataset.index), 1);
                    document.getElementById('modal-labels').value = labels.join(', ');
                    renderLabelsPreview();
                });
            });
        }

        // ============ ATTACHMENTS ============
        function renderAttachments() {
            const container = document.getElementById('attachments-list');
            const attachments = state.currentCard?.attachments || [];

            container.innerHTML = attachments.map((att, i) => `
                <div class="attachment-item">
                    <span>${escapeHtml(att.name)}</span>
                    <span class="attachment-remove" data-index="${i}">×</span>
                </div>
            `).join('');

            container.querySelectorAll('.attachment-remove').forEach(btn => {
                btn.addEventListener('click', () => {
                    state.currentCard.attachments.splice(parseInt(btn.dataset.index), 1);
                    renderAttachments();
                });
            });
        }

        // ============ VOICE RECORDER ============
        async function toggleRecording() {
            const recordBtn = document.getElementById('record-btn');
            const statusEl = document.getElementById('record-status');
            const timerEl = document.getElementById('record-timer');

            if (!state.isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    state.mediaRecorder = new MediaRecorder(stream);
                    state.audioChunks = [];

                    state.mediaRecorder.ondataavailable = (e) => {
                        state.audioChunks.push(e.data);
                    };

                    state.mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(state.audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            state.currentCard.voiceMemo = reader.result;
                            renderCards();
                        };
                        reader.readAsDataURL(audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                    };

                    state.mediaRecorder.start();
                    state.isRecording = true;
                    recordBtn.classList.add('recording');
                    recordBtn.textContent = '■';
                    statusEl.textContent = 'Recording...';
                    state.recordingStartTime = Date.now();
                    state.recordingTimer = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - state.recordingStartTime) / 1000);
                        const mins = Math.floor(elapsed / 60);
                        const secs = elapsed % 60;
                        timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                    }, 1000);
                } catch (error) {
                    showToast('Microphone access denied', 'error');
                }
            } else {
                state.mediaRecorder?.stop();
                state.isRecording = false;
                recordBtn.classList.remove('recording');
                recordBtn.textContent = '●';
                statusEl.textContent = 'Click to record';
                clearInterval(state.recordingTimer);
                timerEl.textContent = '0:00';
            }
        }

        // ============ COMMENTS ============
        async function loadComments(cardId) {
            try {
                const comments = await api(`/cards/${cardId}/comments`);
                state.currentCard.comments = comments;
                renderComments();
            } catch (error) {
                // Ignore errors for comments
            }
        }

        function renderComments() {
            const container = document.getElementById('comments-list');
            const comments = state.currentCard?.comments || [];

            container.innerHTML = comments.map(c => `
                <div class="comment">
                    <div class="comment-avatar">${(c.author || 'U')[0].toUpperCase()}</div>
                    <div class="comment-body">
                        <div class="comment-header">
                            <span class="comment-author">${escapeHtml(c.author || 'User')}</span>
                            <span class="comment-time">${formatTimeAgo(c.createdAt)}</span>
                        </div>
                        <div class="comment-text">${escapeHtml(c.text)}</div>
                    </div>
                </div>
            `).join('');
        }

        async function addComment() {
            const input = document.getElementById('comment-input');
            const text = input.value.trim();
            if (!text || !state.currentCard?.id) return;

            try {
                await api(`/cards/${state.currentCard.id}/comments`, {
                    method: 'POST',
                    body: JSON.stringify({ text, author: 'You' })
                });
                input.value = '';
                await loadComments(state.currentCard.id);
            } catch (error) {
                showToast('Failed to add comment', 'error');
            }
        }

        // ============ AGENT PANEL ============
        async function loadAgentJobs() {
            const container = document.getElementById('agent-jobs-list');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            try {
                const jobs = await api('/jobs/pending');
                
                if (jobs.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">✓</div>
                            <div class="empty-state-text">No pending jobs</div>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = jobs.map(job => `
                    <div class="job-card" data-id="${job.id}">
                        <div class="job-title">${escapeHtml(job.title)}</div>
                        <div class="job-meta">Queued ${formatTimeAgo(job.createdAt)}</div>
                        <button class="job-claim-btn" data-id="${job.id}">Claim Job</button>
                    </div>
                `).join('');

                container.querySelectorAll('.job-claim-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        try {
                            await api(`/jobs/${btn.dataset.id}/claim`, { method: 'POST' });
                            showToast('Job claimed!', 'success');
                            loadAgentJobs();
                        } catch (error) {
                            showToast('Failed to claim job', 'error');
                        }
                    });
                });
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠</div>
                        <div class="empty-state-text">Failed to load jobs</div>
                    </div>
                `;
            }
        }

        // ============ SEARCH ============
        function handleSearch(query) {
            state.searchQuery = query.toLowerCase();
            
            document.querySelectorAll('.card').forEach(cardEl => {
                const title = cardEl.querySelector('.card-title')?.textContent?.toLowerCase() || '';
                const desc = cardEl.querySelector('.card-description')?.textContent?.toLowerCase() || '';
                const matches = !state.searchQuery || title.includes(state.searchQuery) || desc.includes(state.searchQuery);
                cardEl.classList.toggle('filtered-out', !matches);
            });
        }

        // ============ CONTEXT MENU ============
        function showContextMenu(cardId, x, y) {
            const existing = document.querySelector('.context-menu');
            if (existing) existing.remove();

            const menu = document.createElement('div');
            menu.className = 'context-menu';
            menu.style.cssText = `
                position: fixed;
                left: ${x}px;
                top: ${y}px;
                background: var(--bg-card);
                border: 1px solid var(--border-subtle);
                border-radius: var(--radius-md);
                padding: 6px;
                z-index: 1000;
                box-shadow: var(--shadow-float);
                min-width: 150px;
            `;

            menu.innerHTML = `
                <div class="context-item" data-action="edit">Edit</div>
                <div class="context-item" data-action="move-left">← Move Left</div>
                <div class="context-item" data-action="move-right">Move Right →</div>
                <div class="context-item" data-action="delete" style="color: var(--danger);">Delete</div>
            `;

            menu.querySelectorAll('.context-item').forEach(item => {
                item.style.cssText = `
                    padding: 10px 14px;
                    border-radius: var(--radius-sm);
                    cursor: pointer;
                    font-size: 13px;
                    color: var(--text-primary);
                `;
                item.addEventListener('mouseenter', () => {
                    item.style.background = 'var(--bg-input)';
                });
                item.addEventListener('mouseleave', () => {
                    item.style.background = 'transparent';
                });
                item.addEventListener('click', () => {
                    const card = state.cards.find(c => c.id === cardId);
                    switch (item.dataset.action) {
                        case 'edit':
                            openModal(card);
                            break;
                        case 'move-left':
                            moveCardLeft(cardId);
                            break;
                        case 'move-right':
                            moveCardRight(cardId);
                            break;
                        case 'delete':
                            deleteCard(cardId);
                            break;
                    }
                    menu.remove();
                });
            });

            document.body.appendChild(menu);

            setTimeout(() => {
                document.addEventListener('click', () => menu.remove(), { once: true });
            }, 0);
        }

        // ============ COLUMN EVENTS ============
        function initColumnEvents() {
            // Add card buttons
            document.querySelectorAll('.add-card-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    state.currentCard = {
                        id: null,
                        title: '',
                        description: '',
                        column: btn.dataset.column,
                        priority: 'low',
                        labels: [],
                        dueDate: '',
                        isJob: false,
                        agentInstructions: '',
                        attachments: [],
                        voiceMemo: null,
                        comments: []
                    };
                    openModal(state.currentCard);
                });
            });

            // Card click to open modal
            document.querySelectorAll('.card').forEach(cardEl => {
                cardEl.addEventListener('click', (e) => {
                    if (e.target.closest('.card-delete')) {
                        e.stopPropagation();
                        return;
                    }
                    const card = state.cards.find(c => c.id === cardEl.dataset.id);
                    if (card) {
                        state.currentCard = { ...card };
                        loadComments(card.id).then(() => openModal(state.currentCard));
                    }
                });
            });

            // Delete button
            document.querySelectorAll('.card-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteCard(btn.dataset.id);
                });
            });

            // Context menu (right-click)
            document.querySelectorAll('.card').forEach(cardEl => {
                cardEl.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    showContextMenu(cardEl.dataset.id, e.clientX, e.clientY);
                });

                // Long press for mobile
                let pressTimer;
                cardEl.addEventListener('touchstart', () => {
                    pressTimer = setTimeout(() => {
                        const rect = cardEl.getBoundingClientRect();
                        showContextMenu(cardEl.dataset.id, rect.left + 20, rect.top + 20);
                    }, 500);
                });
                cardEl.addEventListener('touchend', () => clearTimeout(pressTimer));
                cardEl.addEventListener('touchmove', () => clearTimeout(pressTimer));
            });
        }

        // ============ TOAST ============
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ============ UTILITIES ============
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (days === 0) return 'Today';
            if (days === 1) return 'Yesterday';
            if (days < 7) return `${days}d ago`;
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function formatTimeAgo(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            const mins = Math.floor(diff / (1000 * 60));
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (mins < 1) return 'Just now';
            if (mins < 60) return `${mins}m ago`;
            if (hours < 24) return `${hours}h ago`;
            return `${days}d ago`;
        }

        // ============ EVENT LISTENERS ============
        document.addEventListener('DOMContentLoaded', () => {
            // Auth form
            document.getElementById('auth-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const password = document.getElementById('password-input').value;
                login(password);
            });

            // Check existing token
            if (state.token) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app').classList.add('visible');
                loadBoard();
            }

            // Header buttons
            document.getElementById('add-card-btn').addEventListener('click', () => openModal());
            document.getElementById('agent-btn').addEventListener('click', () => {
                document.getElementById('agent-panel').classList.add('visible');
                loadAgentJobs();
            });
            document.getElementById('close-agent-panel').addEventListener('click', () => {
                document.getElementById('agent-panel').classList.remove('visible');
            });

            // Search
            document.getElementById('search-input').addEventListener('input', (e) => {
                handleSearch(e.target.value);
            });

            // Modal
            document.getElementById('card-modal').addEventListener('click', (e) => {
                if (e.target.classList.contains('modal-overlay')) {
                    closeModal();
                }
            });

            document.getElementById('modal-save').addEventListener('click', saveModal);
            document.getElementById('modal-delete').addEventListener('click', deleteModalCard);

            // Priority pills
            document.querySelectorAll('.priority-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    document.querySelectorAll('.priority-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                });
            });

            // Labels input
            document.getElementById('modal-labels').addEventListener('input', renderLabelsPreview);

            // Job toggle
            document.getElementById('job-toggle').addEventListener('click', function() {
                this.classList.toggle('active');
                document.getElementById('agent-section').classList.toggle('visible', this.classList.contains('active'));
            });

            // Drop zone
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');

            dropZone.addEventListener('click', () => fileInput.click());
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });
            dropZone.addEventListener('drop', async (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                await handleFiles(e.dataTransfer.files);
            });
            fileInput.addEventListener('change', async (e) => {
                await handleFiles(e.target.files);
            });

            async function handleFiles(files) {
                if (!state.currentCard.attachments) state.currentCard.attachments = [];
                
                for (const file of files) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        state.currentCard.attachments.push({
                            name: file.name,
                            type: file.type,
                            data: reader.result
                        });
                        renderAttachments();
                    };
                    reader.readAsDataURL(file);
                }
            }

            // Voice recorder
            document.getElementById('record-btn').addEventListener('click', toggleRecording);

            // Comments
            document.getElementById('comment-submit').addEventListener('click', addComment);
            document.getElementById('comment-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addComment();
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                // Don't trigger if typing in input
                if (e.target.matches('input, textarea, select')) return;

                switch (e.key.toLowerCase()) {
                    case 'n':
                        e.preventDefault();
                        openModal();
                        break;
                    case 's':
                        e.preventDefault();
                        document.getElementById('search-input').focus();
                        break;
                    case 'r':
                        e.preventDefault();
                        toggleRecording();
                        break;
                    case 'escape':
                        closeModal();
                        document.getElementById('agent-panel').classList.remove('visible');
                        break;
                }
            });

            // Mobile search
            document.getElementById('mobile-search-btn').addEventListener('click', () => {
                const searchContainer = document.querySelector('.search-container');
                if (window.innerWidth <= 768) {
                    searchContainer.style.display = searchContainer.style.display === 'flex' ? 'none' : 'flex';
                    if (searchContainer.style.display === 'flex') {
                        searchContainer.querySelector('input').focus();
                    }
                }
            });
        });
    </script>
</body>
